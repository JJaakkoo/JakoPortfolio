<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jako's Portfolio</title>
        <style>
            body {
                background-color: #f8f9fa; /* Nice offwhite */
                margin: 0;
                height: 100vh;
                
                /* Fixed Flexbox for perfect centering */
                display: flex;
                flex-direction: column;
                justify-content: center; 
                align-items: center; 
                
                font-family: monospace;
            }

            .header-container {
                text-align: center;
            }

            h1 {
                margin: 0 0 30px 0; /* Added bottom margin to separate from buttons */
                font-size: 2rem;
            }

            .button-container {
                display: flex;
                gap: 15px; /* Space between buttons */
                flex-wrap: wrap; /* Allows buttons to wrap on smaller screens */
                justify-content: center;
            }

            .btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                text-decoration: none;
                padding: 10px 20px;
                font-size: 1rem;
                font-weight: bold;
                border-radius: 4px;
                transition: all 0.3s ease;
                border: 2px solid transparent;
            }

            .btn svg {
                width: 18px;
                height: 18px;
                fill: currentColor;
            }

            /* LinkedIn */
            .btn-linkedin {
                color: #0077b5;
                border-color: #0077b5;
            }
            .btn-linkedin:hover {
                background-color: #0077b5;
                color: white;
            }

            /* GitHub */
            .btn-github {
                color: #333333;
                border-color: #333333;
            }
            .btn-github:hover {
                background-color: #333333;
                color: white;
            }

            /* Dreamtea */
            .btn-dreamtea {
                color: #8FC6EE; /* Extracted Blue from menu */
                border-color: #8FC6EE;
            }
            .btn-dreamtea:hover {
                background-color: #8FC6EE;
                color: white;
            }

            /* Matchabrry */
            .btn-matchabrry {
                color: #DDA6A9; /* Extracted Pink from logo */
                border-color: #DDA6A9;
            }
            .btn-matchabrry:hover {
                background-color: #DDA6A9;
                color: white; /* White text on hover for contrast */
            }
        </style>
    </head>
    <body>
        <div class="header-container">
            <h1>Jako's Portfolio</h1>
            
            <div class="button-container">
